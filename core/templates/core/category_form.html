{% extends 'core/base.html' %}

{% block title %}Añadir Categoría - CrumbCore{% endblock %}

{% block content %}
<div class="d-sm-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800">Añadir Nueva Categoría</h1>
    <a href="{% url 'product_list' %}" class="d-none d-sm-inline-block btn btn-sm btn-secondary shadow-sm">
        <i class="fas fa-arrow-left fa-sm text-white-50"></i> Volver al Catálogo
    </a>
</div>

<div class="row">
    <div class="col-lg-6">
        <div class="card shadow mb-4">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Detalles de la Categoría</h6>
            </div>
            <div class="card-body">
                <form method="POST" action="{% url 'create_category' %}">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="name">Nombre de la Categoría *</label>
                        <input type="text" class="form-control" id="name" name="name" required placeholder="Ej. Tortas Frías, Galletas, Panadería...">
                    </div>

                    <div class="form-group">
                        <label for="description">Descripción (Opcional)</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Ej. Postres que requieren refrigeración constante."></textarea>
                    </div>

                    <hr>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Guardar Categoría
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
